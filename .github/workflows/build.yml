name: Build

on:
  workflow_dispatch:
  workflow_call:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Build executable (standalone folder)
        # Standalone (not onefile): a folder of exe + DLLs that does NOT
        # self-extract at startup, which avoids the Wacatac.B!ml false positive
        # that onefile Python builds trigger. resources/ is bundled so the
        # solution renderer can find the aspect icons.
        run: uv run -m nuitka --python-flag=-m --output-dir=dist --mode=standalone --lto=yes --enable-plugin=tk-inter --include-data-dir=resources=resources --output-file=thaumcraft4-research-bot.exe --assume-yes-for-downloads src

      - name: Package standalone build
        shell: pwsh
        run: |
          $dist = Get-ChildItem -Path dist -Directory -Filter *.dist | Select-Object -First 1
          Rename-Item -Path $dist.FullName -NewName "thaumcraft4-research-bot"
          Compress-Archive -Path (Join-Path dist "thaumcraft4-research-bot") -DestinationPath thaumcraft4-research-bot-windows.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: executable
          path: thaumcraft4-research-bot-windows.zip
